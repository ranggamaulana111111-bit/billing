<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$(identity) — Terputus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            padding: 20px;
        }
        .logout-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 32px 32px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .icon-box {
            width: 64px;
            height: 64px;
            background: rgba(239,68,68,0.12);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 28px;
            color: #f87171;
        }
        h2 {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 12px;
        }
        .info-box {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
        }
        .info-box div {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }
        .info-box div span:first-child {
            color: rgba(255,255,255,0.4);
        }
        .info-box div span:last-child {
            color: rgba(255,255,255,0.7);
        }
        .btn-relogin {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-relogin:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(59,130,246,0.35);
            color: #fff;
        }
        .footer-text {
            margin-top: 24px;
            color: rgba(255,255,255,0.2);
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="logout-card">
        <div class="icon-box">
            <i class="fa-solid fa-power-off"></i>
        </div>
        <h2>Sesi Berakhir</h2>
        <p>Anda telah terputus dari hotspot $(identity).</p>

        $(if session-time)
        <div class="info-box">
            <div>
                <span>Username</span>
                <span>$(username)</span>
            </div>
            <div>
                <span>Waktu terhubung</span>
                <span>$(session-time)</span>
            </div>
            <div>
                <span>Total pemakaian</span>
                <span>$(session-total)</span>
            </div>
        </div>
        $(endif)

        <a href="$(link-login)" class="btn-relogin">
            <i class="fa-solid fa-right-to-bracket me-2"></i>Masuk Lagi
        </a>

        <div class="footer-text">
            &copy; $(identity) &mdash; RabegNet Billing
        </div>
    </div>
</body>
</html>
